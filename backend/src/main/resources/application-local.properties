# H2 Database for Fast Local Development
spring.datasource.url=jdbc:h2:file:./data/qmsdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Session Management for Local (H2)
spring.session.jdbc.initialize-schema=always
spring.session.timeout=32400s

# Disable Flyway for local to avoid migration script conflicts with H2
spring.flyway.enabled=false

# [LOCAL FIX] SameSite=Lax (Cross-port localhost request allowed)
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false

# [SYNC] Supabase Connection for Sync-Down (Please fill these)
supabase.datasource.url=
supabase.datasource.username=
supabase.datasource.password=