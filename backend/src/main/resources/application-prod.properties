# Force use of PostgreSQL (Supabase) via Environment Variables
server.forward-headers-strategy=framework
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Database Schema
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.connect-retries=10
spring.flyway.connect-retries-interval=5s

# [SECURITY PATCH] 운영 환경 세션 및 업로드 정책
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=30m
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# [SECURITY PATCH] 로깅 레벨 최적화 (정보 노출 최소화)
logging.level.root=WARN
logging.level.com.example.ims=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.orm.jdbc.bind=ERROR

# HikariCP fine-tuning for Supabase (more resilient to network lag)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.max-lifetime=1800000

# [Optimization] Prevent startup blocking by DB connection
spring.datasource.hikari.initialization-fail-timeout=-1
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.default_batch_fetch_size=1000

# [Optimization] Open-In-View disabled to reduce overhead
spring.jpa.open-in-view=false

# Cache Config (60 seconds)
spring.cache.type=caffeine
spring.cache.caffeine.spec=expireAfterWrite=60s

# [운영] 스토리지 설정 (S3/Supabase 연동)
storage.type=${STORAGE_TYPE:local}
storage.s3.endpoint=${STORAGE_S3_ENDPOINT:}
storage.s3.bucket=${STORAGE_S3_BUCKET:}
storage.s3.access-key=${STORAGE_S3_ACCESS_KEY:}
storage.s3.secret-key=${STORAGE_S3_SECRET_KEY:}
storage.s3.region=${STORAGE_S3_REGION:ap-northeast-2}
