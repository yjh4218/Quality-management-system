spring.application.name=internal-management-system
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# Default Active Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# [DEFAULT] Supabase PostgreSQL (Hardcoded for Deployment Reliability)
spring.datasource.url=jdbc:postgresql://db.tizmjqreozfipdfpuxof.supabase.co:5432/postgres
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=A1s2d3f4g5!@
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.orm.jdbc.bind=info
logging.level.org.hibernate.SQL=INFO

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
file.upload-dir=uploads

# [보안] 세션 쿠키 배포 환경 최적화
server.servlet.session.cookie.name=QMS_SESSION_V2
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=none
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never

# Flyway Configuration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.enabled=true

# CORS Configuration
cors.allowed-origins=https://qualitymange.pages.dev,http://localhost:5173