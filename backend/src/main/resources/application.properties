spring.application.name=internal-management-system
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# Default Active Profile (Set to 'local' for development)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# [DEFAULT] H2 Database for Local Development
# Profile 'prod' will override these values with Supabase credentials
spring.datasource.url=jdbc:h2:file:./data/qmsdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.orm.jdbc.bind=info
logging.level.org.hibernate.SQL=INFO

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
file.upload-dir=uploads

# [보안] 세션 쿠키 배포 환경 최적화
server.servlet.session.cookie.name=QMS_SESSION_V2
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=none
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never

# Flyway Configuration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.flyway.enabled=true

# CORS Configuration
cors.allowed-origins=https://qualitymange.pages.dev,http://localhost:5173,https://yjh332123-qms.hf.space

# [보안] 데이터 암호화용 마스터 키
# 운영 환경에서는 반드시 환경변수(APP_ENCRYPTION_SECRET_KEY)를 통해 16자 이상의 강력한 키를 설정해야 합니다.
app.encryption.secret-key=${APP_ENCRYPTION_SECRET_KEY:qms_local_dev_key_16}

# [인코딩] HTTP 요청/응답 UTF-8 강제 (한글 깨짐 방지)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true