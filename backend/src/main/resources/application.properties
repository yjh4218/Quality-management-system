spring.application.name=internal-management-system
server.port=${PORT:8080}

# Default Active Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# [DEFAULT] H2 Database for Local Development
# Profile 'prod' will override these values with Supabase credentials
spring.datasource.url=jdbc:h2:file:./data/qmsdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.orm.jdbc.bind=info
logging.level.org.hibernate.SQL=INFO

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
file.upload-dir=uploads

# [보안] 세션 쿠키 배포 환경 최적화
server.servlet.session.cookie.name=QMS_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
spring.session.store-type=jdbc

# Flyway Configuration
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true

# CORS Configuration
cors.allowed-origins=https://qualitymange.pages.dev,http://localhost:5173